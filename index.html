<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brain Hub 外脑控制台</title>
    <style>
      :root {
        --bg: #f7f8f3;
        --panel: #ffffff;
        --ink: #1d2521;
        --muted: #65736c;
        --line: #d9dfd4;
        --green: #176b5b;
        --green-dark: #0d423a;
        --blue: #315f9d;
        --amber: #a96818;
        --red: #b4493f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 26px 0 40px;
      }
      header,
      .actions,
      .panel-title,
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      header,
      .panel-title.split,
      .row.split {
        justify-content: space-between;
      }
      header {
        margin-bottom: 14px;
      }
      h1,
      h2,
      p {
        margin: 0;
      }
      h1 {
        font-size: 30px;
      }
      h2 {
        font-size: 18px;
      }
      button,
      input,
      select {
        font: inherit;
      }
      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        cursor: pointer;
        font-weight: 800;
        padding: 0 13px;
      }
      button.primary {
        border-color: var(--green);
        background: var(--green);
        color: #ffffff;
      }
      button:disabled,
      input:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      input,
      select {
        min-width: 0;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        padding: 0 12px;
      }
      .muted,
      .eyebrow,
      .item span,
      .state-grid span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }
      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 14px;
      }
      .panel-title {
        margin-bottom: 12px;
        color: var(--green-dark);
      }
      .system-panel {
        margin-bottom: 10px;
      }
      .hierarchy-arrow {
        display: grid;
        min-height: 28px;
        place-items: center;
        color: var(--green);
        font-size: 22px;
        font-weight: 900;
      }
      .metrics,
      .grid,
      .bottom {
        display: grid;
        gap: 12px;
      }
      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 12px;
      }
      .grid {
        grid-template-columns: 0.95fr 1.05fr 1.35fr;
      }
      .bottom {
        grid-template-columns: 1fr 1fr;
        margin-top: 12px;
      }
      .metric,
      .item,
      .state-grid > div {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcf8;
        padding: 11px;
      }
      .metric strong {
        display: block;
        margin-top: 3px;
        font-size: 26px;
      }
      .state-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .state-grid strong {
        display: block;
        margin-top: 6px;
        overflow-wrap: anywhere;
      }
      .stack {
        display: grid;
        gap: 9px;
      }
      .item {
        width: 100%;
        text-align: left;
      }
      button.item {
        min-height: 58px;
      }
      .item.active {
        border-color: var(--green);
        background: #edf7f0;
      }
      .item strong,
      .item span {
        display: block;
      }
      .forms {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-bottom: 12px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid currentColor;
        border-radius: 999px;
        padding: 2px 8px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }
      .badge.pending {
        color: var(--amber);
      }
      .badge.done {
        color: var(--green);
      }
      .notice {
        margin-bottom: 12px;
        border: 1px solid #d7c799;
        border-radius: 8px;
        background: #fff8e6;
        color: #6b4b0e;
        padding: 10px 12px;
        font-weight: 800;
      }
      .api-strip {
        margin-bottom: 12px;
      }
      .api-strip code {
        display: block;
        overflow: hidden;
        border: 1px dashed var(--green);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--green);
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      pre {
        max-height: 360px;
        overflow: auto;
        border-radius: 8px;
        background: #17201c;
        color: #e8f2eb;
        padding: 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      @media (max-width: 900px) {
        header,
        .actions {
          align-items: stretch;
          flex-direction: column;
        }
        .metrics,
        .grid,
        .bottom,
        .state-grid {
          grid-template-columns: 1fr;
        }
        .forms {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <div class="muted">外脑 API 可视化控制台</div>
          <h1>Brain Hub 外脑控制台</h1>
        </div>
        <div class="actions">
          <button id="refresh" class="primary">刷新云端状态</button>
          <button id="copy">复制接管上下文</button>
        </div>
      </header>

      <section class="api-strip">
        <code id="api-base"></code>
      </section>

      <div id="notice" class="notice" hidden></div>

      <section class="panel system-panel">
        <div class="panel-title split">
          <div>
            <div class="eyebrow">SYSTEM</div>
            <h2>🧠 SYSTEM BRAIN</h2>
          </div>
          <span id="system-status" class="badge">连接中</span>
        </div>
        <div class="state-grid">
          <div>
            <span>系统 ID</span>
            <strong id="system-id">AI_MEMORY_SYSTEM</strong>
          </div>
          <div>
            <span>系统模式</span>
            <strong id="system-mode">云端外脑系统</strong>
          </div>
          <div>
            <span>PROJECT 总数</span>
            <strong id="system-project-count">0</strong>
          </div>
          <div>
            <span>CLIENT 总数</span>
            <strong id="system-client-count">0</strong>
          </div>
        </div>
      </section>

      <div class="hierarchy-arrow">↓</div>

      <section class="metrics">
        <div class="metric"><span>项目数</span><strong id="project-count">0</strong></div>
        <div class="metric"><span>当前项目子脑</span><strong id="client-count">0</strong></div>
        <div class="metric"><span>当前任务</span><strong id="task-count">0</strong></div>
        <div class="metric"><span>事件流</span><strong id="event-count">0</strong></div>
      </section>

      <section class="grid">
        <section class="panel">
          <div class="panel-title">
            <h2>📦 PROJECT LIST</h2>
          </div>
          <form id="create-project-form" class="forms">
            <input id="project-name" aria-label="项目名称" placeholder="项目名称" autocomplete="off" />
            <button id="create-project" class="primary" type="button">新建项目</button>
          </form>
          <div id="projects" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-title split">
            <div>
              <div class="eyebrow">归属于 PROJECT</div>
              <h2>👤 CLIENT LIST</h2>
            </div>
            <span id="selected-project-badge" class="badge">未选择项目</span>
          </div>
          <form id="create-client-form" class="forms">
            <input id="client-name" aria-label="子项目名称" placeholder="子项目名称（副脑）" autocomplete="off" disabled />
            <button id="create-client" class="primary" type="button">新建子项目</button>
          </form>
          <div id="clients" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-title split">
            <h2>当前 CLIENT</h2>
            <span id="client-status" class="badge">未连接</span>
          </div>
          <div class="stack">
            <div class="item">
              <span>所属 SYSTEM</span>
              <strong id="current-system">AI_MEMORY_SYSTEM</strong>
            </div>
            <div class="item">
              <span>所属 PROJECT</span>
              <strong id="current-project">-</strong>
            </div>
            <div class="item">
              <span>当前子脑</span>
              <strong id="current-client">-</strong>
            </div>
            <div class="item">
              <span>当前任务</span>
              <strong id="current-task">-</strong>
            </div>
            <pre id="handover">请先选择项目，再选择子脑。</pre>
          </div>
        </section>
      </section>

      <div class="hierarchy-arrow">↓</div>

      <section class="bottom">
        <section class="panel">
          <div class="panel-title">
            <h2>任务队列</h2>
          </div>
          <div id="tasks" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>事件流</h2>
          </div>
          <div id="events" class="stack"></div>
        </section>
      </section>
    </main>

    <script>
      const API_BASE = "https://leemin880210-sys.vercel.app/api";
      const REFRESH_INTERVAL_MS = 15000;
      const API_RETRY_ATTEMPTS = 2;

      const defaultSystem = {
        system_id: "AI_MEMORY_SYSTEM",
        name: "SYSTEM BRAIN",
        mode: "cloud_brain_os",
        status: "connecting"
      };

      const state = {
        system: defaultSystem,
        counts: { projects: 0, clients: 0, tasks: 0, events: 0 },
        projects: [],
        clients: [],
        taskQueue: [],
        eventStream: [],
        selectedProjectId: new URLSearchParams(location.search).get("project_id") || "",
        selectedClientId: new URLSearchParams(location.search).get("client_id") || "",
        selectedStatePack: null,
        loading: false
      };

      const el = (id) => document.getElementById(id);

      const statusText = {
        idle: "空闲",
        pending: "待处理",
        running: "执行中",
        done: "已完成",
        blocked: "已阻塞",
        failed: "失败",
        connected: "已连接",
        connecting: "连接中",
        account_ops: "采集模式",
        operation_ops: "执行模式",
        evolution_ops: "优化模式",
        operation_system: "运营系统",
        cloud_brain_os: "云端外脑系统"
      };

      const wait = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));

      function notice(message, isError = false) {
        el("notice").hidden = !message;
        el("notice").textContent = message || "";
        el("notice").style.borderColor = isError ? "#e2aaa4" : "#d7c799";
        el("notice").style.background = isError ? "#fff1ef" : "#fff8e6";
        el("notice").style.color = isError ? "#8a2f28" : "#6b4b0e";
      }

      async function api(path, options = {}, optional = false) {
        const headers = {
          Accept: "application/json",
          ...(options.headers || {})
        };

        if (options.body && !headers["Content-Type"]) {
          headers["Content-Type"] = "application/json";
        }

        for (let attempt = 0; attempt <= API_RETRY_ATTEMPTS; attempt += 1) {
          try {
            const response = await fetch(`${API_BASE}${path}`, { ...options, headers });
            const text = await response.text();
            let payload = null;

            try {
              payload = text ? JSON.parse(text) : null;
            } catch {
              payload = null;
            }

            if (!response.ok || payload?.success === false) {
              throw new Error(payload?.error || "外脑连接中...");
            }

            return payload ?? {};
          } catch (error) {
            if (attempt < API_RETRY_ATTEMPTS) {
              await wait(500 * (attempt + 1));
            } else if (optional) {
              return null;
            } else {
              throw error;
            }
          }
        }

        return optional ? null : {};
      }

      function asArray(payload, keys) {
        if (Array.isArray(payload)) return payload;
        for (const key of keys) {
          if (Array.isArray(payload?.[key])) return payload[key];
        }
        if (Array.isArray(payload?.data)) return payload.data;
        return [];
      }

      function getClientId(client) {
        return client?.client_id || client?.id || "";
      }

      function getProjectId(project) {
        return project?.project_id || project?.id || "";
      }

      function selectedProject() {
        return state.projects.find((project) => getProjectId(project) === state.selectedProjectId) || null;
      }

      function selectedClient() {
        const stateClient = state.selectedStatePack?.client_state;
        if (stateClient && getClientId(stateClient)) return stateClient;
        return state.clients.find((client) => getClientId(client) === state.selectedClientId) || null;
      }

      async function loadDashboard(projectOverride = "", clientOverride = "") {
        state.loading = true;
        notice("外脑连接中...");
        render();

        const [systemPayload, projectsPayload, eventsPayload] = await Promise.all([
          api("/system", {}, true),
          api("/projects", {}, true),
          api("/events", {}, true)
        ]);

        state.system = systemPayload?.system || defaultSystem;
        state.counts = systemPayload?.counts || state.counts;
        state.projects = asArray(projectsPayload, ["projects", "project_brains"]);
        state.eventStream = asArray(eventsPayload, ["events", "event_stream", "event_history"]);

        const nextProjectId =
          projectOverride && state.projects.some((project) => getProjectId(project) === projectOverride)
            ? projectOverride
            : state.selectedProjectId && state.projects.some((project) => getProjectId(project) === state.selectedProjectId)
              ? state.selectedProjectId
              : getProjectId(state.projects[0]);

        state.selectedProjectId = nextProjectId || "";

        if (state.selectedProjectId) {
          const clientsPayload = await api(`/clients?project_id=${encodeURIComponent(state.selectedProjectId)}`, {}, true);
          state.clients = asArray(clientsPayload, ["clients", "client_brains"]);
        } else {
          state.clients = [];
        }

        const nextClientId =
          clientOverride && state.clients.some((client) => getClientId(client) === clientOverride)
            ? clientOverride
            : state.selectedClientId && state.clients.some((client) => getClientId(client) === state.selectedClientId)
              ? state.selectedClientId
              : getClientId(state.clients[0]);

        state.selectedClientId = nextClientId || "";

        if (state.selectedClientId) {
          await selectClient(state.selectedClientId, false);
        } else {
          state.selectedStatePack = null;
          state.taskQueue = [];
          render();
        }

        notice(systemPayload || projectsPayload ? "外脑 API 已同步" : "外脑连接中...");
        state.loading = false;
      }

      async function selectProject(projectId) {
        state.selectedProjectId = projectId;
        state.selectedClientId = "";
        state.selectedStatePack = null;
        state.taskQueue = [];
        await loadDashboard(projectId, "");
      }

      async function selectClient(clientId, showNotice = true) {
        state.selectedClientId = clientId;
        state.loading = true;
        if (showNotice) notice("外脑连接中...");

        try {
          const [statePackPayload, tasksPayload] = await Promise.all([
            api(`/client/${encodeURIComponent(clientId)}`),
            api(`/tasks?client_id=${encodeURIComponent(clientId)}`)
          ]);

          const clientState = statePackPayload?.client_state || statePackPayload?.client || statePackPayload?.state || {};
          const taskQueue = asArray(statePackPayload, ["task_queue", "tasks"]);
          const eventStream = asArray(statePackPayload, ["event_stream", "event_history", "events"]);

          state.selectedStatePack = {
            ...(statePackPayload || {}),
            client_state: clientState,
            task_queue: taskQueue.length ? taskQueue : asArray(tasksPayload, ["task_queue", "tasks"]),
            event_stream: eventStream.length
              ? eventStream
              : state.eventStream.filter((event) => event.client_id === clientId)
          };
          state.taskQueue = state.selectedStatePack.task_queue;
          state.eventStream = state.selectedStatePack.event_stream;

          render();
          if (showNotice) notice(`已加载子脑：${clientId}`);
        } catch {
          state.taskQueue = [];
          notice("外脑连接中...");
          render();
        } finally {
          state.loading = false;
        }
      }

      async function createProject(event) {
        event?.preventDefault?.();
        const projectName = el("project-name").value.trim();

        if (!projectName) {
          notice("请先填写项目名称");
          return;
        }

        notice("外脑连接中...");
        try {
          const result = await api("/project/create", {
            method: "POST",
            body: JSON.stringify({ project_name: projectName })
          });
          el("project-name").value = "";
          await loadDashboard(result.project?.project_id || "", "");
          notice(result.created ? "项目已创建" : "项目已存在，已切换到该项目");
        } catch {
          notice("外脑连接中...");
        }
      }

      async function createClient(event) {
        event?.preventDefault?.();
        const clientName = el("client-name").value.trim();

        if (!state.selectedProjectId) {
          notice("请先选择或创建项目");
          return;
        }

        if (!clientName) {
          notice("请填写子项目名称（副脑）");
          return;
        }

        notice("外脑连接中...");
        try {
          const result = await api("/client/create", {
            method: "POST",
            body: JSON.stringify({
              client_name: clientName,
              project_id: state.selectedProjectId
            })
          });
          el("client-name").value = "";
          await loadDashboard(state.selectedProjectId, result.client?.client_id || "");
          notice("子项目已创建");
        } catch {
          notice("外脑连接中...");
        }
      }

      function render() {
        const project = selectedProject();
        const client = selectedClient();
        const tasks = state.taskQueue || [];
        const events = state.selectedStatePack?.event_stream || state.eventStream || [];

        el("api-base").textContent = `外脑接口地址：${API_BASE}`;
        el("system-status").textContent = statusText[state.system.status] || state.system.status || "连接中";
        el("system-id").textContent = state.system.system_id || "AI_MEMORY_SYSTEM";
        el("system-mode").textContent = statusText[state.system.mode] || state.system.mode || "云端外脑系统";
        el("system-project-count").textContent = String(state.counts.projects || state.projects.length);
        el("system-client-count").textContent = String(state.counts.clients || 0);
        el("project-count").textContent = String(state.projects.length);
        el("client-count").textContent = String(state.clients.length);
        el("task-count").textContent = String(tasks.length);
        el("event-count").textContent = String(events.length);
        el("selected-project-badge").textContent = project ? getProjectId(project) : "未选择项目";

        el("projects").innerHTML =
          state.projects
            .map((projectItem) => {
              const projectId = getProjectId(projectItem);
              return `<button class="item ${projectId === state.selectedProjectId ? "active" : ""}" data-project="${escapeHtml(
                projectId
              )}" type="button"><strong>${escapeHtml(projectItem.name || projectId || "-")}</strong><span>${escapeHtml(
                projectId || "-"
              )}</span></button>`;
            })
            .join("") || `<div class="item"><span>暂无项目，请先新建项目</span></div>`;

        document.querySelectorAll("[data-project]").forEach((button) => {
          button.addEventListener("click", () => {
            void selectProject(button.dataset.project);
          });
        });

        el("client-name").disabled = !state.selectedProjectId;
        el("create-client").disabled = false;
        el("clients").innerHTML =
          state.clients
            .map((clientItem) => {
              const clientId = getClientId(clientItem);
              return `<button class="item ${clientId === state.selectedClientId ? "active" : ""}" data-client="${escapeHtml(
                clientId
              )}" type="button"><strong>${escapeHtml(clientItem.name || clientId || "-")}</strong><span>${escapeHtml(
                clientId || "-"
              )}</span></button>`;
            })
            .join("") ||
          `<div class="item"><span>${state.selectedProjectId ? "当前项目暂无子脑" : "请先选择或创建项目"}</span></div>`;

        document.querySelectorAll("[data-client]").forEach((button) => {
          button.addEventListener("click", () => {
            void selectClient(button.dataset.client);
          });
        });

        el("current-system").textContent = state.system.system_id || "AI_MEMORY_SYSTEM";
        el("current-project").textContent = project ? `${project.name || getProjectId(project)} / ${getProjectId(project)}` : "-";
        el("current-client").textContent = client ? `${client.name || getClientId(client)} / ${getClientId(client)}` : "-";
        el("current-task").textContent = client?.current_task || state.selectedStatePack?.current_task || "空闲";
        el("client-status").textContent =
          statusText[state.selectedStatePack?.current_mode || client?.status] ||
          state.selectedStatePack?.current_mode ||
          client?.status ||
          "未连接";
        el("handover").textContent = client ? buildHandoverText(project, client, tasks, events) : "请先选择项目，再选择子脑。";

        el("tasks").innerHTML =
          tasks
            .map(
              (task) => `<div class="item"><strong>${escapeHtml(
                task.action || task.current_task || task.task_id || "-"
              )}</strong><span class="badge ${escapeHtml(task.status || "")}">${escapeHtml(
                statusText[task.status] || task.status || "-"
              )}</span></div>`
            )
            .join("") || `<div class="item"><span>当前子脑暂无任务</span></div>`;

        el("events").innerHTML =
          events
            .map(
              (event) => `<div class="item"><strong>${escapeHtml(event.type || event.event_id || "-")}</strong><span>${escapeHtml(
                event.timestamp ? new Date(event.timestamp).toLocaleString() : "-"
              )}</span></div>`
            )
            .join("") || `<div class="item"><span>当前子脑暂无事件</span></div>`;
      }

      function buildHandoverText(project, client, tasks, events) {
        const statePack = state.selectedStatePack || {};
        return `# Brain Hub 外脑接管上下文

system_id = ${state.system.system_id || "AI_MEMORY_SYSTEM"}
project_id = ${client.project_id || project?.project_id || ""}
client_id = ${getClientId(client)}
current_mode = ${statePack.current_mode || client.status || ""}
外脑接口地址 = ${API_BASE}

client_state:
${JSON.stringify(statePack.client_state || client, null, 2)}

task_queue:
${JSON.stringify(tasks, null, 2)}

event_stream:
${JSON.stringify(events, null, 2)}

AI 执行规则:
1. READ API
2. GET STATE
3. GET TASK
4. EXECUTE
5. WRITE EVENT
6. UPDATE TASK
7. REPEAT

强制规则:
- 不允许重置状态。
- 不允许 client 脱离 project。
- 必须继续外脑 API 返回的 task_queue。
- 所有执行结果必须写回外脑 API。`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      el("refresh").addEventListener("click", () => {
        void loadDashboard();
      });

      el("create-project").addEventListener("click", () => {
        void createProject();
      });

      el("create-project-form").addEventListener("submit", (event) => {
        void createProject(event);
      });

      el("create-client").addEventListener("click", () => {
        void createClient();
      });

      el("create-client-form").addEventListener("submit", (event) => {
        void createClient(event);
      });

      el("copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(el("handover").textContent);
        notice("接管上下文已复制");
      });

      render();
      void loadDashboard();
      window.setInterval(() => {
        void loadDashboard();
      }, REFRESH_INTERVAL_MS);
    </script>
  </body>
</html>
