<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>外脑接管控制台</title>
    <style>
      :root {
        --bg: #f6f7f2;
        --panel: #ffffff;
        --panel-strong: #edf3ee;
        --ink: #111816;
        --muted: #64716b;
        --line: #d7ded5;
        --green: #0f6b50;
        --red: #8a2f28;
        --blue: #1f5ca8;
        --shadow: 0 10px 30px rgba(20, 36, 29, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(100% - 48px, 1180px);
        margin: 0 auto;
        padding: 26px 0 36px;
      }

      header,
      .split,
      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 32px;
      }

      h2 {
        font-size: 18px;
      }

      button,
      input {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
      }

      button {
        cursor: pointer;
        font-weight: 800;
        padding: 0 14px;
      }

      button:disabled,
      input:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input {
        width: 100%;
        padding: 0 12px;
      }

      .primary {
        border-color: var(--green);
        background: var(--green);
        color: #fff;
      }

      .danger {
        border-color: #e2aaa4;
        background: #fff7f6;
        color: var(--red);
      }

      .muted,
      .eyebrow,
      .item span,
      .state-grid span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .notice {
        margin: 14px 0;
        padding: 12px 14px;
        border: 1px solid #d7c799;
        border-radius: 8px;
        background: #fff8e6;
        color: #6b4b0e;
        font-weight: 800;
      }

      .notice.success {
        border-color: #87b99b;
        background: #edf7f0;
        color: #24573c;
      }

      .notice.error {
        border-color: #e2aaa4;
        background: #fff1ef;
        color: var(--red);
      }

      .api-strip code {
        display: block;
        margin: 14px 0;
        overflow: hidden;
        border: 1px dashed var(--green);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--green);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .metrics,
      .grid,
      .context-grid,
      .state-grid {
        display: grid;
        gap: 12px;
      }

      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin: 14px 0;
      }

      .grid {
        grid-template-columns: 1fr 1.15fr 1.4fr;
      }

      .context-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-top: 14px;
      }

      .state-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric,
      .panel,
      .item,
      .state-grid > div,
      .context-box {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .metric,
      .panel {
        padding: 16px;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 26px;
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .forms {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-bottom: 12px;
      }

      .stack {
        display: grid;
        gap: 9px;
      }

      .item {
        position: relative;
        width: 100%;
        min-height: 58px;
        overflow: visible;
        padding: 12px 108px 12px 12px;
        text-align: left;
      }

      .item.active {
        border-color: var(--green);
        background: #edf7f0;
      }

      .item strong,
      .item span {
        display: block;
        overflow-wrap: anywhere;
      }

      .row-delete-button {
        position: absolute;
        top: 50%;
        right: 12px;
        z-index: 20;
        min-width: 72px;
        transform: translateY(-50%);
      }

      .row-delete-button:hover,
      .row-delete-button:focus-visible {
        border-color: #cf6f65;
        background: #ffe5e1;
        box-shadow: 0 0 0 3px rgba(138, 47, 40, 0.12);
        outline: none;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid currentColor;
        border-radius: 999px;
        padding: 2px 8px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 800;
      }

      .state-grid > div,
      .context-box {
        min-height: 74px;
        padding: 12px;
        box-shadow: none;
      }

      .state-grid strong {
        display: block;
        margin-top: 6px;
        overflow-wrap: anywhere;
      }

      .context-box {
        min-height: 180px;
      }

      .context-box h2 {
        margin-bottom: 12px;
      }

      .context-box p {
        line-height: 1.55;
        overflow-wrap: anywhere;
        font-weight: 700;
      }

      .task-list {
        display: grid;
        gap: 8px;
      }

      .handoff-json-panel {
        margin-top: 12px;
      }

      .json-box {
        max-height: 420px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #101915;
        color: #f5fff8;
        padding: 14px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .wide {
        grid-column: 1 / -1;
      }

      @media (max-width: 980px) {
        .metrics,
        .grid,
        .context-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 680px) {
        main {
          width: min(100% - 20px, 1180px);
        }

        header,
        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .metrics,
        .grid,
        .context-grid,
        .state-grid,
        .forms {
          grid-template-columns: 1fr;
        }

        .wide {
          grid-column: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <div class="muted">外脑状态</div>
          <h1>接管控制台</h1>
        </div>
        <div class="actions">
          <button id="refresh" class="primary">刷新</button>
          <button id="copy-handoff">查看当前 handoff.json</button>
        </div>
      </header>

      <section class="api-strip">
        <code id="api-base"></code>
      </section>

      <div id="notice" class="notice" hidden></div>

      <section class="metrics">
        <div class="metric"><span>接口</span><strong id="api-status">连接中</strong></div>
        <div class="metric"><span>项目</span><strong id="project-count">0</strong></div>
        <div class="metric"><span>子项目</span><strong id="client-count">0</strong></div>
        <div class="metric"><span>任务</span><strong id="task-count">0</strong></div>
      </section>

      <section class="grid">
        <section class="panel">
          <div class="panel-title">
            <h2>项目列表</h2>
          </div>
          <form id="create-project-form" class="forms">
            <input id="project-name" aria-label="项目名称" placeholder="项目名称" autocomplete="off" />
            <button id="create-project" class="primary" type="button">新建项目</button>
          </form>
          <div id="projects" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-title split">
            <div>
              <div id="selected-project-name" class="eyebrow">未选择项目</div>
              <h2>子项目列表</h2>
            </div>
            <span id="selected-project-badge" class="badge">0</span>
          </div>
          <form id="create-client-form" class="forms">
            <input id="client-name" aria-label="子项目名称" placeholder="子项目名称" autocomplete="off" disabled />
            <button id="create-client" class="primary" type="button">新建子项目</button>
          </form>
          <div id="clients" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-title split">
            <div>
              <div class="eyebrow">工作状态</div>
              <h2 id="current-client-name">未选择子项目</h2>
            </div>
            <span id="client-status" class="badge">未连接</span>
          </div>
          <div class="state-grid">
            <div>
              <span>项目</span>
              <strong id="current-project">-</strong>
            </div>
            <div>
              <span>子项目 ID</span>
              <strong id="current-client">-</strong>
            </div>
            <div>
              <span>模式</span>
              <strong id="current-mode">-</strong>
            </div>
            <div>
              <span>任务数</span>
              <strong id="current-task-count">0</strong>
            </div>
            <div class="wide">
              <span>当前任务</span>
              <strong id="current-task">空闲</strong>
            </div>
          </div>
          <div class="actions" style="margin-top: 12px">
            <button id="generate-handoff" class="primary" type="button">生成接管包</button>
            <button id="send-handoff" type="button">发送给外脑</button>
            <button id="view-handoff" type="button">查看当前 handoff.json</button>
          </div>
        </section>
      </section>

      <section class="context-grid">
        <section class="context-box">
          <h2>STATE</h2>
          <div id="context-state" class="state-grid"></div>
        </section>
        <section class="context-box">
          <h2>TASK</h2>
          <div id="context-task" class="task-list"></div>
        </section>
        <section class="context-box">
          <h2>MEMORY</h2>
          <p id="context-memory">暂无记忆摘要</p>
        </section>
        <section class="context-box">
          <h2>NEXT STEP</h2>
          <p id="context-next">等待任务</p>
        </section>
      </section>

      <section id="handoff-json-panel" class="panel handoff-json-panel">
        <div class="panel-title split">
          <div>
            <div class="eyebrow">接管传递</div>
            <h2>当前 handoff.json</h2>
          </div>
          <span id="handoff-status" class="badge">未发送</span>
        </div>
        <pre id="handoff-json" class="json-box">尚未生成 handoff.json</pre>
      </section>
    </main>

    <script>
      const API_BASE = "https://leemin880210-sys.vercel.app/api";
      const API_RETRY_ATTEMPTS = 2;

      const state = {
        projects: [],
        clients: [],
        taskQueue: [],
        eventStream: [],
        selectedProjectId: new URLSearchParams(location.search).get("project_id") || "",
        selectedClientId: new URLSearchParams(location.search).get("client_id") || "",
        selectedStatePack: null,
        contextPack: null,
        handoffJson: null,
        handoffSentAt: "",
        loading: false,
        busy: false
      };

      const statusText = {
        idle: "空闲",
        pending: "待处理",
        running: "进行中",
        done: "已完成",
        blocked: "已阻塞",
        failed: "失败",
        connected: "已连接",
        connecting: "连接中",
        account_ops: "采集",
        operation_ops: "执行",
        evolution_ops: "优化",
        operation_system: "运营项目"
      };

      const el = (id) => document.getElementById(id);
      const wait = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));

      function notice(message, tone = "info") {
        el("notice").hidden = !message;
        el("notice").textContent = message || "";
        el("notice").className = `notice ${tone === "success" ? "success" : tone === "error" ? "error" : ""}`;
      }

      async function api(path, options = {}, optional = false) {
        const headers = {
          Accept: "application/json",
          ...(options.headers || {})
        };

        if (options.body && !headers["Content-Type"]) {
          headers["Content-Type"] = "application/json";
        }

        for (let attempt = 0; attempt <= API_RETRY_ATTEMPTS; attempt += 1) {
          try {
            const response = await fetch(`${API_BASE}${path}`, { ...options, headers, cache: "no-store" });
            const text = await response.text();
            let payload = null;

            try {
              payload = text ? JSON.parse(text) : null;
            } catch {
              payload = null;
            }

            if (!response.ok || payload?.success === false) {
              throw new Error(payload?.details || payload?.error || "接口请求失败");
            }

            return payload ?? {};
          } catch (error) {
            if (attempt < API_RETRY_ATTEMPTS) {
              await wait(500 * (attempt + 1));
            } else if (optional) {
              return null;
            } else {
              throw error;
            }
          }
        }

        return optional ? null : {};
      }

      function asArray(payload, keys) {
        if (Array.isArray(payload)) return payload;
        for (const key of keys) {
          if (Array.isArray(payload?.[key])) return payload[key];
        }
        if (Array.isArray(payload?.data)) return payload.data;
        return [];
      }

      function asRecord(value) {
        return value && typeof value === "object" && !Array.isArray(value) ? value : {};
      }

      function textValue(value, fallback = "-") {
        if (typeof value === "string" && value.trim()) return value;
        if (typeof value === "number" || typeof value === "boolean") return String(value);
        return fallback;
      }

      function clearHandoff() {
        state.contextPack = null;
        state.handoffJson = null;
        state.handoffSentAt = "";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function getClientId(client) {
        return client?.client_id || client?.id || "";
      }

      function getProjectId(project) {
        return project?.project_id || project?.id || "";
      }

      function isVisibleProject(project) {
        const value = `${getProjectId(project)} ${project?.name || ""}`.toLowerCase();
        const hiddenPrefixes = ["crud_verify_", "delete_verify_", "api_truth_", "test_", ["project", "create", "smoke"].join("_")];
        return !hiddenPrefixes.some((prefix) => value.startsWith(prefix));
      }

      function selectedProject() {
        return state.projects.find((project) => getProjectId(project) === state.selectedProjectId) || null;
      }

      function selectedClient() {
        const stateClient = state.selectedStatePack?.client_state;
        if (stateClient && getClientId(stateClient)) return stateClient;
        return state.clients.find((client) => getClientId(client) === state.selectedClientId) || null;
      }

      async function loadDashboard(projectOverride = "", clientOverride = "") {
        state.loading = true;
        notice("正在同步状态");
        render();

        const [projectsPayload, healthPayload] = await Promise.all([
          api("/projects", {}, true),
          api("/health", {}, true)
        ]);

        state.projects = asArray(projectsPayload, ["projects", "project_brains"]).filter(isVisibleProject);

        const nextProjectId =
          projectOverride && state.projects.some((project) => getProjectId(project) === projectOverride)
            ? projectOverride
            : state.selectedProjectId && state.projects.some((project) => getProjectId(project) === state.selectedProjectId)
              ? state.selectedProjectId
              : getProjectId(state.projects[0]);

        state.selectedProjectId = nextProjectId || "";

        if (state.selectedProjectId) {
          const clientsPayload = await api(`/clients?project_id=${encodeURIComponent(state.selectedProjectId)}`, {}, true);
          state.clients = asArray(clientsPayload, ["clients", "client_brains"]);
        } else {
          state.clients = [];
        }

        const nextClientId =
          clientOverride && state.clients.some((client) => getClientId(client) === clientOverride)
            ? clientOverride
            : state.selectedClientId && state.clients.some((client) => getClientId(client) === state.selectedClientId)
              ? state.selectedClientId
              : getClientId(state.clients[0]);

        state.selectedClientId = nextClientId || "";

        if (state.selectedClientId) {
          await selectClient(state.selectedClientId, false);
        } else {
          state.selectedStatePack = null;
          state.taskQueue = [];
          clearHandoff();
        }

        el("api-status").textContent = healthPayload?.api === "connected" ? "正常" : "连接中";
        state.loading = false;
        notice(projectsPayload ? "状态已同步" : "外脑连接中", projectsPayload ? "success" : "info");
        render();
      }

      async function selectProject(projectId) {
        state.selectedProjectId = projectId;
        state.selectedClientId = "";
        state.selectedStatePack = null;
        clearHandoff();
        state.taskQueue = [];
        await loadDashboard(projectId, "");
      }

      async function selectClient(clientId, showNotice = true) {
        state.selectedClientId = clientId;
        clearHandoff();
        state.loading = true;
        if (showNotice) notice("正在加载工作状态");

        try {
          const [statePackPayload, tasksPayload, eventsPayload] = await Promise.all([
            api(`/client/${encodeURIComponent(clientId)}`),
            api(`/tasks?client_id=${encodeURIComponent(clientId)}`),
            api(`/events?client_id=${encodeURIComponent(clientId)}`, {}, true)
          ]);

          const clientState = statePackPayload?.client_state || statePackPayload?.client || statePackPayload?.state || {};
          state.selectedStatePack = {
            ...(statePackPayload || {}),
            client_state: clientState,
            task_queue: asArray(statePackPayload, ["task_queue", "tasks"]).length
              ? asArray(statePackPayload, ["task_queue", "tasks"])
              : asArray(tasksPayload, ["task_queue", "tasks"]),
            event_stream: asArray(statePackPayload, ["event_stream", "event_history", "events"]).length
              ? asArray(statePackPayload, ["event_stream", "event_history", "events"])
              : asArray(eventsPayload, ["event_stream", "event_history", "events"])
          };
          state.taskQueue = state.selectedStatePack.task_queue;
          state.eventStream = state.selectedStatePack.event_stream;
          if (showNotice) notice("工作状态已加载", "success");
        } catch (error) {
          state.taskQueue = [];
          notice(error instanceof Error ? error.message : "工作状态加载失败", "error");
        } finally {
          state.loading = false;
          render();
        }
      }

      async function createProject(event) {
        event?.preventDefault?.();
        if (state.busy) return;

        const projectName = el("project-name").value.trim();
        if (!projectName) {
          notice("请填写项目名称", "error");
          return;
        }

        state.busy = true;
        notice("正在创建项目");
        render();
        try {
          const result = await api("/project/create", {
            method: "POST",
            body: JSON.stringify({ project_name: projectName, system_id: "brain_os" })
          });
          el("project-name").value = "";
          await loadDashboard(result.project?.project_id || "", "");
          notice(result.created ? "项目已创建" : "项目已存在，已切换到该项目", "success");
        } catch (error) {
          notice(error instanceof Error ? error.message : "项目创建失败", "error");
        } finally {
          state.busy = false;
          render();
        }
      }

      async function createClient(event) {
        event?.preventDefault?.();
        if (state.busy) return;

        const clientName = el("client-name").value.trim();
        if (!state.selectedProjectId) {
          notice("请先选择项目", "error");
          return;
        }
        if (!clientName) {
          notice("请填写子项目名称", "error");
          return;
        }

        state.busy = true;
        notice("正在创建子项目");
        render();
        try {
          const result = await api("/client/create", {
            method: "POST",
            body: JSON.stringify({ client_name: clientName, project_id: state.selectedProjectId })
          });
          el("client-name").value = "";
          await loadDashboard(state.selectedProjectId, result.client?.client_id || "");
          notice("子项目已创建", "success");
        } catch (error) {
          notice(error instanceof Error ? error.message : "子项目创建失败", "error");
        } finally {
          state.busy = false;
          render();
        }
      }

      async function deleteProject(projectId) {
        if (!projectId || state.busy) return;

        state.busy = true;
        notice("正在删除项目");
        render();
        try {
          const result = await api("/project/delete", {
            method: "DELETE",
            body: JSON.stringify({ project_id: projectId })
          });
          if (!result.deleted || result.deleted_id !== projectId) {
            throw new Error("项目删除失败：接口未确认删除");
          }
          state.selectedProjectId = "";
          state.selectedClientId = "";
          state.selectedStatePack = null;
          clearHandoff();
          await loadDashboard("", "");
          notice("项目已删除，列表已刷新", "success");
        } catch (error) {
          notice(error instanceof Error ? error.message : "项目删除失败", "error");
        } finally {
          state.busy = false;
          render();
        }
      }

      async function deleteClient(clientId) {
        if (!clientId || state.busy) return;

        state.busy = true;
        notice("正在删除子项目");
        render();
        try {
          const result = await api("/client/delete", {
            method: "DELETE",
            body: JSON.stringify({ client_id: clientId })
          });
          if (!result.deleted || result.deleted_id !== clientId) {
            throw new Error("子项目删除失败：接口未确认删除");
          }
          const nextProjectId = result.project_id || state.selectedProjectId;
          state.selectedClientId = "";
          state.selectedStatePack = null;
          clearHandoff();
          await loadDashboard(nextProjectId, "");
          notice("子项目已删除，列表已刷新", "success");
        } catch (error) {
          notice(error instanceof Error ? error.message : "子项目删除失败", "error");
        } finally {
          state.busy = false;
          render();
        }
      }

      async function loadContextPack() {
        const client = selectedClient();
        if (!client) {
          notice("请先选择子项目", "error");
          return;
        }

        state.busy = true;
        notice("正在获取接管包");
        render();
        try {
          const result = await api(`/client/${encodeURIComponent(getClientId(client))}/context_pack`);
          state.contextPack = result.context_pack || null;
          notice("接管包已加载", "success");
        } catch (error) {
          notice(error instanceof Error ? error.message : "接管包加载失败", "error");
        } finally {
          state.busy = false;
          render();
        }
      }

      async function fetchSelectedContextPack() {
        const client = selectedClient();
        if (!client) throw new Error("请选择子项目");

        const result = await api(`/client/${encodeURIComponent(getClientId(client))}/context_pack`);
        return result.context_pack || null;
      }

      function buildHandoffJson(sourceContextPack) {
        const client = selectedClient();
        const project = selectedProject();
        const pack = asRecord(sourceContextPack?.pack);
        const memory = asRecord(pack.memory);
        const runtime = asRecord(pack.runtime_instruction);
        const instruction = asRecord(pack.EXECUTION_INSTRUCTION);
        const context = contextPackData();
        const chatLog = asArray(memory.chat_log, []);
        const sourceTasks = asArray(pack.task_queue, []);
        const sourceEvents = asArray(pack.event_stream, []);
        const clientId = getClientId(client) || textValue(context.packState.client_id, state.selectedClientId);
        const projectId = getProjectId(project) || textValue(context.packState.project_id, state.selectedProjectId);
        const nextStep =
          textValue(runtime.next_action, "") ||
          textValue(instruction.command, "") ||
          textValue(pack.current_task, "") ||
          context.nextStep ||
          "等待任务";
        const handoffState = {
          ...asRecord(client),
          ...context.packState,
          client_id: clientId,
          project_id: projectId
        };
        const summaryBase =
          textValue(sourceContextPack?.summary, "") ||
          textValue(memory.latest_context_pack_summary, "") ||
          `子项目 ${client?.name || clientId} 已生成接管包。`;

        return {
          version: "handoff.v1",
          generated_at: new Date().toISOString(),
          client_id: clientId,
          project_id: projectId,
          chat_log: chatLog,
          summary: [
            summaryBase,
            `当前状态：${statusText[textValue(handoffState.status, client?.status || "")] || textValue(handoffState.status, "-")}。`,
            `任务队列：${sourceTasks.length || state.taskQueue.length} 个任务；事件流：${sourceEvents.length || state.eventStream.length} 条事件；当前对话：${chatLog.length} 条。`,
            `下一步：${nextStep}。`
          ].join("\n"),
          state: handoffState,
          next_step: nextStep,
          context_pack_id: sourceContextPack?.pack_id
        };
      }

      async function ensureHandoffJson() {
        const sourceContextPack = state.contextPack || (await fetchSelectedContextPack());
        state.contextPack = sourceContextPack;
        state.handoffJson = buildHandoffJson(sourceContextPack);
        state.handoffSentAt = "";
        return state.handoffJson;
      }

      async function generateHandoffJson() {
        const client = selectedClient();
        if (!client) {
          notice("请先选择子项目", "error");
          return;
        }

        state.busy = true;
        notice("正在生成 handoff.json");
        render();
        try {
          await ensureHandoffJson();
          notice("handoff.json 已生成", "success");
        } catch (error) {
          notice(error instanceof Error ? error.message : "handoff.json 生成失败", "error");
        } finally {
          state.busy = false;
          render();
        }
      }

      async function sendHandoffJson() {
        const client = selectedClient();
        if (!client) {
          notice("请先选择子项目", "error");
          return;
        }

        state.busy = true;
        notice("正在发送给外脑");
        render();
        try {
          const payload = state.handoffJson || (await ensureHandoffJson());
          const result = await api("/handoff", {
            method: "POST",
            body: JSON.stringify(payload)
          });

          if (!result.received) {
            throw new Error("外脑未确认接收 handoff.json");
          }

          state.handoffJson = result.handoff || payload;
          state.handoffSentAt = new Date().toISOString();
          notice("handoff.json 已发送给外脑", "success");
        } catch (error) {
          notice(error instanceof Error ? error.message : "handoff.json 发送失败", "error");
        } finally {
          state.busy = false;
          render();
        }
      }

      async function showCurrentHandoffJson() {
        if (!state.handoffJson) {
          notice("请先生成 handoff.json", "error");
          return;
        }

        await navigator.clipboard.writeText(JSON.stringify(state.handoffJson, null, 2));
        el("handoff-json-panel").scrollIntoView({ behavior: "smooth", block: "start" });
        notice("当前 handoff.json 已显示并复制", "success");
      }

      function contextPackData() {
        const client = selectedClient();
        const pack = asRecord(state.contextPack?.pack);
        const packState = Object.keys(asRecord(pack.state)).length ? asRecord(pack.state) : asRecord(client);
        const tasks = asArray(pack.task_queue, []).length ? asArray(pack.task_queue, []) : state.taskQueue;
        const memory = asRecord(pack.memory);
        const runtime = asRecord(pack.runtime_instruction);
        const instruction = asRecord(pack.EXECUTION_INSTRUCTION);
        return {
          packState,
          tasks,
          memorySummary:
            textValue(memory.latest_context_pack_summary, "") ||
            textValue(state.contextPack?.summary, "") ||
            "暂无记忆摘要",
          nextStep:
            textValue(runtime.next_action, "") ||
            textValue(instruction.command, "") ||
            textValue(pack.current_task, "") ||
            client?.current_task ||
            "等待任务"
        };
      }

      function render() {
        const project = selectedProject();
        const client = selectedClient();
        const tasks = state.taskQueue || [];
        const context = contextPackData();

        el("api-base").textContent = `API：${API_BASE}`;
        el("project-count").textContent = String(state.projects.length);
        el("client-count").textContent = String(state.clients.length);
        el("task-count").textContent = String(tasks.length);
        el("selected-project-name").textContent = project?.name || "未选择项目";
        el("selected-project-badge").textContent = String(state.clients.length);

        el("project-name").disabled = state.busy;
        el("create-project").disabled = state.busy;
        el("projects").innerHTML =
          state.projects
            .map((projectItem) => {
              const projectId = getProjectId(projectItem);
              return `<div class="item ${projectId === state.selectedProjectId ? "active" : ""}" data-project="${escapeHtml(
                projectId
              )}" role="button" tabindex="0"><strong>${escapeHtml(projectItem.name || projectId || "-")}</strong><span>${escapeHtml(
                projectId || "-"
              )}</span><button class="row-delete-button danger" data-delete-project="${escapeHtml(
                projectId
              )}" type="button" ${state.busy ? "disabled" : ""}>删除</button></div>`;
            })
            .join("") || `<div class="item"><span>暂无项目</span></div>`;

        document.querySelectorAll("[data-project]").forEach((row) => {
          row.addEventListener("click", () => {
            if (state.busy) return;
            void selectProject(row.dataset.project);
          });
        });
        document.querySelectorAll("[data-delete-project]").forEach((button) => {
          button.addEventListener("pointerdown", (event) => event.stopPropagation());
          button.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            void deleteProject(button.dataset.deleteProject);
          });
        });

        el("client-name").disabled = state.busy || !state.selectedProjectId;
        el("create-client").disabled = state.busy;
        el("clients").innerHTML =
          state.clients
            .map((clientItem) => {
              const clientId = getClientId(clientItem);
              return `<div class="item ${clientId === state.selectedClientId ? "active" : ""}" data-client="${escapeHtml(
                clientId
              )}" role="button" tabindex="0"><strong>${escapeHtml(clientItem.name || clientId || "-")}</strong><span>${escapeHtml(
                clientId || "-"
              )}</span><button class="row-delete-button danger" data-delete-client="${escapeHtml(
                clientId
              )}" type="button" ${state.busy ? "disabled" : ""}>删除</button></div>`;
            })
            .join("") ||
          `<div class="item"><span>${state.selectedProjectId ? "当前项目暂无子项目" : "请先选择项目"}</span></div>`;

        document.querySelectorAll("[data-client]").forEach((row) => {
          row.addEventListener("click", () => {
            if (state.busy) return;
            void selectClient(row.dataset.client);
          });
        });
        document.querySelectorAll("[data-delete-client]").forEach((button) => {
          button.addEventListener("pointerdown", (event) => event.stopPropagation());
          button.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            void deleteClient(button.dataset.deleteClient);
          });
        });

        el("refresh").disabled = state.busy || state.loading;
        el("copy-handoff").disabled = state.busy || !state.handoffJson;
        el("generate-handoff").disabled = state.busy || !client;
        el("send-handoff").disabled = state.busy || !client;
        el("view-handoff").disabled = state.busy || !state.handoffJson;
        el("current-client-name").textContent = client?.name || "未选择子项目";
        el("current-project").textContent = project?.name || "-";
        el("current-client").textContent = client ? getClientId(client) : "-";
        el("current-mode").textContent = statusText[state.selectedStatePack?.current_mode || client?.status] || client?.status || "-";
        el("current-task-count").textContent = String(tasks.length);
        el("current-task").textContent = client?.current_task || state.selectedStatePack?.current_task || "空闲";
        el("client-status").textContent = statusText[state.selectedStatePack?.current_mode || client?.status] || client?.status || "未连接";

        el("context-state").innerHTML = [
          ["client_id", textValue(context.packState.client_id, client ? getClientId(client) : "-")],
          ["project_id", textValue(context.packState.project_id, state.selectedProjectId || "-")],
          ["status", statusText[textValue(context.packState.status, client?.status || "")] || textValue(context.packState.status, "-")],
          ["current_task", textValue(context.packState.current_task, client?.current_task || "空闲")]
        ]
          .map(([label, value]) => `<div><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`)
          .join("");

        el("context-task").innerHTML =
          context.tasks
            .map(
              (task) =>
                `<div class="item" style="min-height: auto; padding-right: 12px"><strong>${escapeHtml(
                  task.action || task.current_task || task.task_id || "-"
                )}</strong><span class="badge">${escapeHtml(statusText[task.status] || task.status || "-")}</span></div>`
            )
            .join("") || `<p>暂无任务</p>`;
        el("context-memory").textContent = context.memorySummary;
        el("context-next").textContent = context.nextStep;
        el("handoff-status").textContent = state.handoffSentAt ? `已发送 ${new Date(state.handoffSentAt).toLocaleString("zh-CN")}` : "未发送";
        el("handoff-json").textContent = state.handoffJson ? JSON.stringify(state.handoffJson, null, 2) : "尚未生成 handoff.json";
      }

      el("refresh").addEventListener("click", () => {
        void loadDashboard();
      });
      el("create-project").addEventListener("click", () => void createProject());
      el("create-project-form").addEventListener("submit", (event) => void createProject(event));
      el("create-client").addEventListener("click", () => void createClient());
      el("create-client-form").addEventListener("submit", (event) => void createClient(event));
      el("generate-handoff").addEventListener("click", () => void generateHandoffJson());
      el("send-handoff").addEventListener("click", () => void sendHandoffJson());
      el("view-handoff").addEventListener("click", () => void showCurrentHandoffJson());
      el("copy-handoff").addEventListener("click", () => void showCurrentHandoffJson());

      render();
      void loadDashboard();
    </script>
  </body>
</html>
