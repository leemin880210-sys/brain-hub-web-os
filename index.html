<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brain Hub 外脑控制台</title>
    <style>
      :root {
        --bg: #f7f8f3;
        --panel: #ffffff;
        --ink: #1d2521;
        --muted: #65736c;
        --line: #d9dfd4;
        --green: #176b5b;
        --blue: #315f9d;
        --amber: #a96818;
        --red: #b4493f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 26px 0 40px;
      }
      header,
      .row,
      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      header {
        justify-content: space-between;
        margin-bottom: 14px;
      }
      h1,
      h2 {
        margin: 0;
      }
      h1 {
        font-size: 30px;
      }
      h2 {
        font-size: 17px;
      }
      .grid {
        display: grid;
        grid-template-columns: 0.8fr 1fr 1.2fr;
        gap: 12px;
      }
      .bottom {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 12px;
      }
      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 14px;
      }
      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }
      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        padding: 0 13px;
      }
      button.primary {
        border-color: var(--green);
        background: var(--green);
        color: #ffffff;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      .stack {
        display: grid;
        gap: 9px;
      }
      .item {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcf8;
        padding: 11px;
        text-align: left;
      }
      .item.active {
        border-color: var(--green);
        background: #edf7f0;
      }
      .item strong,
      .item span {
        display: block;
      }
      .item span,
      .muted {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid currentColor;
        border-radius: 999px;
        padding: 2px 8px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }
      .badge.pending {
        color: var(--amber);
      }
      .badge.done {
        color: var(--green);
      }
      .badge.error {
        color: var(--red);
      }
      .notice {
        margin-bottom: 12px;
        border: 1px solid #d7c799;
        border-radius: 8px;
        background: #fff8e6;
        color: #6b4b0e;
        padding: 10px 12px;
        font-weight: 800;
      }
      .api-strip {
        margin-bottom: 12px;
      }
      .api-strip code {
        display: block;
        overflow: hidden;
        border: 1px dashed var(--green);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--green);
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      pre {
        max-height: 360px;
        overflow: auto;
        border-radius: 8px;
        background: #17201c;
        color: #e8f2eb;
        padding: 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      @media (max-width: 850px) {
        header,
        .row,
        .actions {
          align-items: stretch;
          flex-direction: column;
        }
        .grid,
        .bottom {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <div class="muted">外脑 API 可视化控制台</div>
          <h1>Brain Hub 外脑控制台</h1>
        </div>
        <div class="actions">
          <button id="refresh" class="primary">刷新云端状态</button>
          <button id="copy">复制接管上下文</button>
        </div>
      </header>

      <section class="api-strip">
        <code id="api-base"></code>
      </section>

      <div id="notice" class="notice" hidden></div>

      <section class="grid">
        <section class="panel">
          <div class="panel-title">
            <h2>项目列表</h2>
            <span id="project-count" class="badge">0</span>
          </div>
          <div id="projects" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>子脑列表</h2>
            <span id="client-count" class="badge">0</span>
          </div>
          <div id="clients" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>接管上下文</h2>
            <span id="client-status" class="badge">未连接</span>
          </div>
          <div class="stack">
            <div class="item">
              <span>当前子脑</span>
              <strong id="current-client">-</strong>
            </div>
            <div class="item">
              <span>当前任务</span>
              <strong id="current-task">-</strong>
            </div>
            <pre id="handover">请选择一个子脑。</pre>
          </div>
        </section>
      </section>

      <section class="bottom">
        <section class="panel">
          <div class="panel-title">
            <h2>任务队列</h2>
            <span id="task-count" class="badge">0</span>
          </div>
          <div id="tasks" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>事件流</h2>
            <span id="event-count" class="badge">0</span>
          </div>
          <div id="events" class="stack"></div>
        </section>
      </section>
    </main>

    <script>
      const API_BASE = "https://your-brain-api-domain.com/api";
      const REFRESH_INTERVAL_MS = 15000;

      const state = {
        projects: [],
        clients: [],
        taskQueue: [],
        eventStream: [],
        selectedClientId: new URLSearchParams(location.search).get("client_id") || "",
        selectedStatePack: null,
        loading: false
      };

      const el = (id) => document.getElementById(id);

      const statusText = {
        idle: "空闲",
        pending: "待执行",
        running: "执行中",
        done: "已完成",
        account_ops: "采集模式",
        operation_ops: "执行模式",
        evolution_ops: "优化模式"
      };

      function notice(message, isError = false) {
        el("notice").hidden = !message;
        el("notice").textContent = message || "";
        el("notice").style.borderColor = isError ? "#e2aaa4" : "#d7c799";
        el("notice").style.background = isError ? "#fff1ef" : "#fff8e6";
        el("notice").style.color = isError ? "#8a2f28" : "#6b4b0e";
      }

      async function api(path, options = {}) {
        const response = await fetch(`${API_BASE}${path}`, {
          ...options,
          headers: {
            Accept: "application/json",
            "Content-Type": "application/json",
            ...(options.headers || {})
          }
        });
        const text = await response.text();
        const payload = text ? JSON.parse(text) : null;

        if (!response.ok) {
          throw new Error(payload?.error || payload?.message || response.statusText);
        }

        return payload;
      }

      function asArray(payload, keys) {
        if (Array.isArray(payload)) return payload;
        for (const key of keys) {
          if (Array.isArray(payload?.[key])) return payload[key];
        }
        if (Array.isArray(payload?.data)) return payload.data;
        return [];
      }

      function getClientId(client) {
        return client?.client_id || client?.id || "";
      }

      function getProjectId(project) {
        return project?.project_id || project?.id || "";
      }

      async function loadDashboard() {
        state.loading = true;
        notice("");
        renderLoading();

        try {
          const [projectsPayload, clientsPayload, eventsPayload] = await Promise.all([
            api("/projects"),
            api("/clients"),
            api("/events")
          ]);

          state.projects = asArray(projectsPayload, ["projects", "project_brains"]);
          state.clients = asArray(clientsPayload, ["clients", "client_brains"]);
          state.eventStream = asArray(eventsPayload, ["events", "event_stream", "event_history"]);

          if (!state.selectedClientId && state.clients[0]) {
            state.selectedClientId = getClientId(state.clients[0]);
          }

          if (state.selectedClientId) {
            await selectClient(state.selectedClientId, false);
          } else {
            state.selectedStatePack = null;
            state.taskQueue = [];
            render();
          }

          notice("外脑 API 已同步");
        } catch (error) {
          notice(`外脑 API 连接失败：${error.message}`, true);
          render();
        } finally {
          state.loading = false;
        }
      }

      async function selectClient(clientId, showNotice = true) {
        state.selectedClientId = clientId;
        state.loading = true;
        if (showNotice) notice("");

        try {
          const [statePackPayload, tasksPayload] = await Promise.all([
            api(`/client/${encodeURIComponent(clientId)}`),
            api(`/tasks?client_id=${encodeURIComponent(clientId)}`)
          ]);

          const clientState = statePackPayload.client_state || statePackPayload.client || statePackPayload.state || {};
          const taskQueue = asArray(statePackPayload, ["task_queue", "tasks"]);
          const eventStream = asArray(statePackPayload, ["event_stream", "event_history", "events"]);

          state.selectedStatePack = {
            ...statePackPayload,
            client_state: clientState,
            task_queue: taskQueue.length ? taskQueue : asArray(tasksPayload, ["task_queue", "tasks"]),
            event_stream: eventStream.length
              ? eventStream
              : state.eventStream.filter((event) => event.client_id === clientId)
          };
          state.taskQueue = state.selectedStatePack.task_queue;
          state.eventStream = state.selectedStatePack.event_stream;

          render();
          if (showNotice) notice(`已接管子脑：${clientId}`);
        } catch (error) {
          notice(`子脑状态读取失败：${error.message}`, true);
          render();
        } finally {
          state.loading = false;
        }
      }

      function renderLoading() {
        el("api-base").textContent = `API BASE: ${API_BASE}`;
      }

      function selectedClient() {
        const stateClient = state.selectedStatePack?.client_state;
        if (stateClient && getClientId(stateClient)) return stateClient;
        return state.clients.find((client) => getClientId(client) === state.selectedClientId) || null;
      }

      function render() {
        const client = selectedClient();
        const project = state.projects.find((item) => getProjectId(item) === client?.project_id);
        const tasks = state.taskQueue || [];
        const events = state.eventStream || [];

        el("api-base").textContent = `API BASE: ${API_BASE}`;
        el("project-count").textContent = String(state.projects.length);
        el("client-count").textContent = String(state.clients.length);
        el("task-count").textContent = String(tasks.length);
        el("event-count").textContent = String(events.length);

        el("projects").innerHTML =
          state.projects
            .map(
              (projectItem) => `<div class="item"><strong>${escapeHtml(
                projectItem.name || projectItem.project_id || projectItem.id || "-"
              )}</strong><span>${escapeHtml(getProjectId(projectItem) || "-")}</span></div>`
            )
            .join("") || `<div class="item"><span>暂无项目数据</span></div>`;

        el("clients").innerHTML =
          state.clients
            .map((clientItem) => {
              const clientId = getClientId(clientItem);
              return `<button class="item ${clientId === state.selectedClientId ? "active" : ""}" data-client="${escapeHtml(
                clientId
              )}" type="button"><strong>${escapeHtml(clientItem.name || clientId || "-")}</strong><span>${escapeHtml(
                clientId || "-"
              )}</span></button>`;
            })
            .join("") || `<div class="item"><span>暂无子脑数据</span></div>`;

        document.querySelectorAll("[data-client]").forEach((button) => {
          button.addEventListener("click", () => {
            void selectClient(button.dataset.client);
          });
        });

        el("current-client").textContent = client ? `${client.name || getClientId(client)} / ${getClientId(client)}` : "-";
        el("current-task").textContent = client?.current_task || state.selectedStatePack?.current_task || "空闲";
        el("client-status").textContent =
          statusText[state.selectedStatePack?.current_mode || client?.status] ||
          state.selectedStatePack?.current_mode ||
          client?.status ||
          "未连接";
        el("handover").textContent = client ? buildHandoverText(project, client, tasks, events) : "请选择一个子脑。";

        el("tasks").innerHTML =
          tasks
            .map(
              (task) => `<div class="item"><strong>${escapeHtml(
                task.action || task.current_task || task.task_id || "-"
              )}</strong><span class="badge ${escapeHtml(task.status || "")}">${escapeHtml(
                statusText[task.status] || task.status || "-"
              )}</span></div>`
            )
            .join("") || `<div class="item"><span>暂无任务队列数据</span></div>`;

        el("events").innerHTML =
          events
            .map(
              (event) => `<div class="item"><strong>${escapeHtml(event.type || event.event_id || "-")}</strong><span>${escapeHtml(
                event.timestamp ? new Date(event.timestamp).toLocaleString() : "-"
              )}</span></div>`
            )
            .join("") || `<div class="item"><span>暂无事件流数据</span></div>`;
      }

      function buildHandoverText(project, client, tasks, events) {
        const statePack = state.selectedStatePack || {};
        return `# Brain Hub 外脑接管上下文

API_BASE = ${API_BASE}

client_id = ${getClientId(client)}
project_id = ${client.project_id || project?.project_id || ""}
current_mode = ${statePack.current_mode || client.status || ""}

client_state:
${JSON.stringify(statePack.client_state || client, null, 2)}

task_queue:
${JSON.stringify(tasks, null, 2)}

event_stream:
${JSON.stringify(events, null, 2)}

AI 执行规则:
1. READ API
2. GET STATE
3. GET TASK
4. EXECUTE
5. WRITE EVENT
6. UPDATE TASK
7. REPEAT

强制规则:
- 不允许重置状态。
- 不允许使用本地 JSON 或本地模拟状态。
- 必须继续外脑 API 返回的 task_queue。
- 所有执行结果必须写回外脑 API。`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      el("refresh").addEventListener("click", () => {
        void loadDashboard();
      });

      el("copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(el("handover").textContent);
        notice("接管上下文已复制");
      });

      renderLoading();
      void loadDashboard();
      window.setInterval(() => {
        void loadDashboard();
      }, REFRESH_INTERVAL_MS);
    </script>
  </body>
</html>
